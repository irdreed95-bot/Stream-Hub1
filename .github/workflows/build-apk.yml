name: Build StreamVault APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install Dependencies
        run: |
          pnpm install
          cd artifacts/streamvault
          pnpm install @capacitor/core @capacitor/android
          pnpm install -g @capacitor/assets

      - name: Build Web Asset
        run: |
          cd artifacts/streamvault
          pnpm run build

      - name: Add and Sync Capacitor Android
        run: |
          cd artifacts/streamvault
          npx cap add android
          npx cap sync android

      - name: Generate Icons and Splash
        run: |
          cd artifacts/streamvault
          if [ -f "icon.png" ]; then
            npx capacitor-assets generate --android
          fi

      - name: Build Android APK
        run: |
          cd artifacts/streamvault/android && ./gradlew assembleDebug

      - name: Upload APK Package
        uses: actions/upload-artifact@v4
        with:
          name: StreamVault-APK
          path: artifacts/streamvault/android/app/build/outputs/apk/debug/app-debug.apk
          
